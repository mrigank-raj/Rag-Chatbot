name: Daily RAG Data Ingestion

on:
  schedule:
    # Run every day at 10:30 AM IST (05:00 AM UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ingestion script
      run: python scripts/ingest.py

    - name: Commit and push updated vectorstore
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -f vectorstore/ db/metadata.db
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily vectorstore update" && git push)
